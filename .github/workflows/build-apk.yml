name: Build Planeja.ai APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap
        run: |
          mkdir -p ~/.bubblewrap
          echo "{\"jdkPath\": \"$JAVA_HOME\", \"androidSdkPath\": \"$ANDROID_SDK_ROOT\"}" > ~/.bubblewrap/config.json

      - name: Gerar Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias planejaai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEY_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Planeja.ai, OU=App, O=Marcena Rio, L=Rio de Janeiro, ST=RJ, C=BR"

      - name: Inicializar projeto TWA
        run: |
          mkdir -p twa-project
          cd twa-project
          printf '\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n' | \
            bubblewrap init \
              --manifest=https://appplanejaai.com.br/manifest.json \
              --directory=. \
              --skip-pwa-validation 2>&1 || true

      - name: Criar twa-manifest.json manualmente
        run: |
          cat > twa-project/twa-manifest.json << 'EOF'
          {
            "packageId": "br.com.planejaai.app",
            "host": "appplanejaai.com.br",
            "name": "Planeja.ai",
            "launcherName": "Planeja.ai",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#1a3a2e",
            "navigationColor": "#1a3a2e",
            "navigationColorDark": "#1a3a2e",
            "navigationDividerColor": "#1a3a2e",
            "navigationDividerColorDark": "#1a3a2e",
            "backgroundColor": "#1a3a2e",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://appplanejaai.com.br/app_icon_512.png",
            "maskableIconUrl": "https://appplanejaai.com.br/app_icon_512.png",
            "monochromeIconUrl": "https://appplanejaai.com.br/app_icon_512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../keystore.jks",
              "alias": "planejaai"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://appplanejaai.com.br/",
            "minSdkVersion": 19,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://appplanejaai.com.br/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": false,
            "enableSidecar": false
          }
          EOF

      - name: Build APK e AAB
        run: |
          cd twa-project
          printf 'no\n${{ secrets.KEY_PASSWORD }}\n${{ secrets.KEY_PASSWORD }}\n' | \
            bubblewrap build --skipPwaValidation

      - name: Listar arquivos gerados
        run: find twa-project -name "*.apk" -o -name "*.aab" 2>/dev/null || echo "Nenhum arquivo encontrado"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: planejaai-apk
          path: twa-project/**/*.apk
          if-no-files-found: warn

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: planejaai-aab
          path: twa-project/**/*.aab
          if-no-files-found: warn
