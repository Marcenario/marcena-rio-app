name: Build Planeja.ai APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Gerar Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias planejaai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEY_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Planeja.ai, OU=App, O=Marcena Rio, L=Rio de Janeiro, ST=RJ, C=BR"

      - name: Criar twa-manifest.json e inicializar projeto
        run: |
          mkdir -p twa-project
          cd twa-project
          cat > twa-manifest.json << 'EOF'
          {
            "packageId": "br.com.planejaai.app",
            "host": "appplanejaai.com.br",
            "name": "Planeja.ai",
            "launcherName": "Planeja.ai",
            "display": "standalone",
            "orientation": "portrait",
            "themeColor": "#1a3a2e",
            "navigationColor": "#1a3a2e",
            "navigationColorDark": "#1a3a2e",
            "navigationDividerColor": "#1a3a2e",
            "navigationDividerColorDark": "#1a3a2e",
            "backgroundColor": "#1a3a2e",
            "enableNotifications": false,
            "startUrl": "/",
            "iconUrl": "https://appplanejaai.com.br/app_icon_512.png",
            "maskableIconUrl": "https://appplanejaai.com.br/app_icon_512.png",
            "monochromeIconUrl": "https://appplanejaai.com.br/app_icon_512.png",
            "appVersion": "1.0.0",
            "appVersionCode": 1,
            "signingKey": {
              "path": "../keystore.jks",
              "alias": "planejaai"
            },
            "splashScreenFadeOutDuration": 300,
            "enableSiteSettingsShortcut": true,
            "isChromeOSOnly": false,
            "isMetaQuest": false,
            "fullScopeUrl": "https://appplanejaai.com.br/",
            "minSdkVersion": 19,
            "shortcuts": [],
            "generatorApp": "bubblewrap-cli",
            "webManifestUrl": "https://appplanejaai.com.br/manifest.json",
            "fallbackType": "customtabs",
            "features": {},
            "alphaDependencies": false,
            "enableSidecar": false
          }
          EOF

      - name: Build APK e AAB
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation
        env:
          BUBBLEWRAP_DISABLE_TELEMETRY: true
          SIGNING_KEY_PATH: ../keystore.jks
          SIGNING_KEY_ALIAS: planejaai
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: planejaai-apk
          path: twa-project/app-release-signed.apk

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: planejaai-aab
          path: twa-project/app-release-bundle.aab
