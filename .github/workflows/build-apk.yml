name: Build Planeja.ai APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: Instalar Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configurar Bubblewrap (evitar prompts interativos)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Gerar Keystore
        run: |
          keytool -genkey -v \
            -keystore keystore.jks \
            -alias planejaai \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass ${{ secrets.KEY_PASSWORD }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -dname "CN=Planeja.ai, OU=App, O=Marcena Rio, L=Rio de Janeiro, ST=RJ, C=BR"

      - name: Inicializar projeto TWA
        run: |
          mkdir -p twa-project
          cd twa-project
          bubblewrap init \
            --manifest=https://appplanejaai.com.br/manifest.json \
            --directory=. \
            --skip-pwa-validation

      - name: Build APK e AAB
        run: |
          cd twa-project
          bubblewrap build --skipPwaValidation
        env:
          SIGNING_KEY_PATH: ../keystore.jks
          SIGNING_KEY_ALIAS: planejaai
          SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          SIGNING_STORE_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: planejaai-apk
          path: twa-project/app-release-signed.apk

      - name: Upload AAB (Play Store)
        uses: actions/upload-artifact@v4
        with:
          name: planejaai-aab
          path: twa-project/app-release-bundle.aab
